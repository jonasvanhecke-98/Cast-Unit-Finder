<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Cast Unit Finder</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px;
      font-family: Arial, Helvetica, sans-serif;
      color: #252525;
      background: #f3f4f5;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    #status {
      margin: 0 0 20px;
      font-size: 14px;
      color: #555;
    }

    .panel {
      padding: 16px;
      background: white;
      border: 1px solid #d8dadd;
      border-radius: 6px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .search-row {
      display: flex;
      gap: 8px;
    }

    input {
      min-width: 0;
      flex: 1;
      padding: 10px;
      border: 1px solid #aeb2b7;
      border-radius: 4px;
      font-size: 15px;
    }

    button {
      padding: 10px 15px;
      border: 0;
      border-radius: 4px;
      color: white;
      background: #0063a3;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      background: #9ba3a8;
    }

    #result {
      margin-top: 16px;
      padding: 14px;
      background: white;
      border: 1px solid #d8dadd;
      border-radius: 6px;
      font-size: 14px;
      white-space: pre-line;
    }

    .success {
      color: #19733b !important;
    }

    .error {
      color: #b42318 !important;
    }
  </style>
</head>

<body>
  <h1>Cast Unit Finder</h1>

  <p id="status">
    Verbinding met Trimble Connect controleren...
  </p>

  <section class="panel">
    <label for="cast-unit-mark">
      Cast Unit Mark
    </label>

    <div class="search-row">
      <input
        id="cast-unit-mark"
        type="text"
        placeholder="Bijvoorbeeld W123"
        autocomplete="off"
      >

      <button id="search-button" type="button" disabled>
        Zoeken
      </button>
    </div>
  </section>

  <section id="result">
    Nog geen object gezocht.
  </section>

  <script type="module">
    import * as WorkspaceAPI
      from "https://cdn.jsdelivr.net/npm/trimble-connect-workspace-api@0.3.34/+esm";

    const statusElement = document.getElementById("status");
    const inputElement = document.getElementById("cast-unit-mark");
    const searchButton = document.getElementById("search-button");
    const resultElement = document.getElementById("result");

    let api = null;

    async function startExtension() {
      if (window.parent === window) {
        statusElement.textContent =
          "Testpagina geopend buiten Trimble Connect.";

        resultElement.textContent =
          "De interface werkt. De verbinding kan pas getest worden wanneer de extensie in Trimble Connect geopend wordt.";

        return;
      }

      try {
        api = await WorkspaceAPI.connect(
          window.parent,
          (event, data) => {
            console.log("Trimble Connect-event:", event, data);
          }
        );

        const project = await api.project.getProject();

        statusElement.textContent =
          `Verbonden met project: ${project.name || project.id}`;

        statusElement.classList.add("success");
        searchButton.disabled = false;
      } catch (error) {
        console.error(error);

        statusElement.textContent =
          "Verbinding met Trimble Connect mislukt.";

        statusElement.classList.add("error");
      }
    }

    function searchCastUnit() {
      const castUnitMark = inputElement.value.trim();

      if (!castUnitMark) {
        resultElement.textContent =
          "Vul eerst een Cast Unit Mark in.";

        return;
      }

      resultElement.textContent =
        `In de volgende stap zoeken we naar: ${castUnitMark}`;
    }

    searchButton.addEventListener("click", searchCastUnit);

    inputElement.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        searchButton.click();
      }
    });

    startExtension();
  </script>
</body>
</html>
