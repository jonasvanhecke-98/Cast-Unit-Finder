<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Cast Unit Finder</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, Helvetica, sans-serif;
      color: #252525;
      background: #f3f4f5;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 21px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    #status {
      margin: 0 0 16px;
      font-size: 13px;
      color: #555;
    }

    .panel {
      margin-bottom: 14px;
      padding: 15px;
      background: white;
      border: 1px solid #d8dadd;
      border-radius: 6px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: bold;
    }

    input,
    button {
      width: 100%;
      font: inherit;
    }

    input {
      padding: 10px;
      border: 1px solid #aeb2b7;
      border-radius: 4px;
      font-size: 15px;
      background: white;
    }

    #cast-unit-mark {
      text-transform: uppercase;
    }

    button {
      padding: 10px 12px;
      border: 0;
      border-radius: 4px;
      color: white;
      background: #0063a3;
      cursor: pointer;
    }

    button:hover {
      background: #004f83;
    }

    button:disabled {
      cursor: not-allowed;
      background: #9ba3a8;
    }

    .secondary {
      color: #252525;
      background: #e4e6e8;
    }

    .secondary:hover {
      background: #d4d7d9;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .single-button {
      margin-top: 10px;
    }

    .small-info {
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.4;
      color: #666;
    }

    #result {
      margin-top: 14px;
      padding: 14px;
      min-height: 80px;
      background: white;
      border: 1px solid #d8dadd;
      border-radius: 6px;
      font-size: 14px;
      white-space: pre-line;
    }

    .result-title {
      margin-bottom: 10px;
      font-size: 19px;
      font-weight: bold;
    }

    .result-info {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
    }

    .result-weight {
      margin-bottom: 7px;
      font-size: 15px;
    }

    .search-result {
      margin-bottom: 8px;
      overflow: hidden;
      background: white;
      border: 1px solid #d8dadd;
      border-radius: 5px;
    }

    .search-result[open] {
      border-color: #0063a3;
    }

    .search-result-summary {
      padding: 11px 12px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      background: #f6f7f8;
    }

    .search-result-summary:hover {
      background: #e9f2f8;
    }

    .search-result-summary.is-active {
      color: #ffffff;
      background: #0063a3;
    }

    .search-result-summary.selection-error {
      color: #ffffff;
      background: #b42318;
    }

    .search-result-details {
      padding: 10px 12px;
      border-top: 1px solid #d8dadd;
    }

    .match-info {
      margin-bottom: 10px;
      padding: 8px;
      font-size: 12px;
      background: #f4f5f6;
      border-radius: 4px;
    }

    .altez-title {
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: bold;
      color: #555;
    }

    .altez-property {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
      padding: 7px 0;
      border-top: 1px solid #eceeef;
      font-size: 12px;
    }

    .altez-property-name {
      overflow-wrap: anywhere;
      color: #555;
    }

    .altez-property-value {
      overflow-wrap: anywhere;
      font-weight: bold;
    }

    .no-altez-properties {
      font-size: 12px;
      color: #777;
    }

    .success {
      color: #19733b !important;
    }

    .error {
      color: #b42318 !important;
    }
  </style>
</head>

<body>
  <h1>Modelzoeker</h1>

  <p id="status">
    Verbinding met Trimble Connect controleren...
  </p>

  <section class="panel">
    <h2>Zoeken op Cast Unit Mark</h2>

    <label for="cast-unit-mark">
      Assembly/Cast unit Mark
    </label>

    <input
      id="cast-unit-mark"
      type="text"
      placeholder="Bijvoorbeeld K10"
      autocomplete="off"
      autocapitalize="characters"
      spellcheck="false"
    >

    <button
      id="mark-search-button"
      class="single-button"
      type="button"
      disabled
    >
      Zoek Cast Unit Mark
    </button>
  </section>

  <section class="panel">
    <h2>Algemeen zoeken</h2>

    <p class="small-info">
      Zoekt de ingegeven tekst in alle parameterwaarden van alle geladen
      modelobjecten.
    </p>

    <label for="general-search">
      Zoektekst
    </label>

    <input
      id="general-search"
      type="text"
      placeholder="Bijvoorbeeld beton, profiel, fase..."
      autocomplete="off"
      spellcheck="false"
    >

    <button
      id="general-search-button"
      class="single-button"
      type="button"
      disabled
    >
      Algemeen zoeken
    </button>
  </section>

  <div class="button-row">
    <button
      id="clear-button"
      class="secondary"
      type="button"
      disabled
    >
      Wissen
    </button>
  </div>

  <section id="result">
    Nog niets gezocht.
  </section>

  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

  <script>
    let API;

    const statusElement =
      document.getElementById("status");

    const markInput =
      document.getElementById("cast-unit-mark");

    const generalInput =
      document.getElementById("general-search");

    const markSearchButton =
      document.getElementById("mark-search-button");

    const generalSearchButton =
      document.getElementById("general-search-button");

    const clearButton =
      document.getElementById("clear-button");

    const resultElement =
      document.getElementById("result");

    const markPropertyNames = [
      "Tekla Assembly.Assembly/Cast unit Mark",
      "Assembly/Cast unit Mark",
      "Tekla Assembly.Cast unit Mark",
      "Cast unit Mark"
    ];

    const weightPropertyNames = [
      "Tekla Assembly.Assembly/Cast unit weight",
      "Assembly/Cast unit weight",
      "Tekla Assembly.Cast unit weight",
      "Cast unit weight"
    ];

    function normaliseerTekst(waarde) {
      return String(waarde ?? "")
        .trim()
        .toLocaleLowerCase("nl-BE");
    }

    function normaliseerMark(waarde) {
      return String(waarde ?? "")
        .trim()
        .toLocaleUpperCase("nl-BE");
    }

    function haalObjecten(model) {
      return Array.isArray(model.objects)
        ? model.objects
        : [];
    }

    function haalRuntimeId(object) {
      if (typeof object === "number") {
        return object;
      }

      return (
        object.id ??
        object.runtimeId ??
        object.objectRuntimeId ??
        null
      );
    }

    function telObjecten(resultaten) {
      if (!Array.isArray(resultaten)) {
        return 0;
      }

      return resultaten.reduce(
        function(totaal, model) {
          return totaal + haalObjecten(model).length;
        },
        0
      );
    }

    function maakSelector(resultaten) {
      return {
        modelObjectIds: resultaten
          .map(function(model) {
            return {
              modelId: model.modelId,

              objectRuntimeIds:
                haalObjecten(model)
                  .map(haalRuntimeId)
                  .filter(function(id) {
                    return (
                      id !== null &&
                      id !== undefined
                    );
                  })
            };
          })
          .filter(function(model) {
            return model.objectRuntimeIds.length > 0;
          })
      };
    }

    async function connectToTrimble() {
      try {
        API = await TrimbleConnectWorkspace.connect(
          window.parent,
          function(event, data) {
            console.log(
              "Trimble Connect-event:",
              event,
              data
            );
          }
        );

        const project =
          await API.project.getProject();

        statusElement.textContent =
          "Verbonden met project: " +
          (project.name || project.id);

        statusElement.classList.add("success");

        markSearchButton.disabled = false;
        generalSearchButton.disabled = false;
      } catch (error) {
        console.error(
          "Verbinding mislukt:",
          error
        );

        statusElement.textContent =
          "Verbinding met Trimble Connect mislukt.";

        statusElement.classList.add("error");
      }
    }

    async function selecteerEnZoom(resultaten) {
      const selector =
        maakSelector(resultaten);

      await API.viewer.setSelection(
        selector,
        "set"
      );

      try {
        await API.viewer.setCamera(
          selector,
          {
            animationTime: 500
          }
        );
      } catch (error) {
        console.warn(
          "Inzoomen is niet gelukt:",
          error
        );
      }
    }

    async function selecteerEnZoomNaarEenObject(
      modelId,
      runtimeId
    ) {
      const selector = {
        modelObjectIds: [
          {
            modelId: modelId,
            objectRuntimeIds: [runtimeId]
          }
        ]
      };

      await API.viewer.setSelection(
        selector,
        "set"
      );

      try {
        await API.viewer.setCamera(
          selector,
          {
            animationTime: 400
          }
        );
      } catch (error) {
        console.warn(
          "Inzoomen naar resultaat is niet gelukt:",
          error
        );
      }
    }

    function zoekPropertyWaarde(
      objectProperties,
      gewensteNamen
    ) {
      const propertySets =
        Array.isArray(objectProperties.properties)
          ? objectProperties.properties
          : [];

      for (const propertySet of propertySets) {
        const setName =
          String(propertySet.set || "").trim();

        const properties =
          Array.isArray(propertySet.properties)
            ? propertySet.properties
            : [];

        for (const property of properties) {
          const propertyName =
            String(property.name || "").trim();

          const volledigeNaam =
            setName
              ? setName + "." + propertyName
              : propertyName;

          const gevonden =
            gewensteNamen.some(
              function(gewensteNaam) {
                return (
                  normaliseerTekst(gewensteNaam) ===
                    normaliseerTekst(propertyName) ||
                  normaliseerTekst(gewensteNaam) ===
                    normaliseerTekst(volledigeNaam)
                );
              }
            );

          if (gevonden) {
            return property.value;
          }
        }
      }

      return null;
    }

    function formatteerGewicht(waarde) {
      if (
        waarde === null ||
        waarde === undefined ||
        waarde === ""
      ) {
        return "niet gevonden";
      }

      const tekst =
        String(waarde).trim();

      if (/(kg|ton|tonne|t)$/i.test(tekst)) {
        return tekst;
      }

      return tekst + " t";
    }

    async function zoekCastUnitMark() {
      const mark =
        normaliseerMark(markInput.value);

      markInput.value = mark;

      if (!mark) {
        resultElement.textContent =
          "Vul eerst een Cast Unit Mark in.";

        return;
      }

      markSearchButton.disabled = true;
      generalSearchButton.disabled = true;

      resultElement.textContent =
        "Zoeken naar Cast Unit Mark " +
        mark +
        "...";

      try {
        let gevondenResultaten = [];
        let gebruikteProperty = "";

        for (const propertyName of markPropertyNames) {
          const resultaten =
            await API.viewer.getObjects({
              parameter: {
                properties: {
                  [propertyName]: mark
                }
              }
            });

          if (telObjecten(resultaten) > 0) {
            gevondenResultaten = resultaten;
            gebruikteProperty = propertyName;
            break;
          }
        }

        if (telObjecten(gevondenResultaten) === 0) {
          resultElement.textContent =
            "Geen object gevonden voor " +
            mark +
            ".";

          return;
        }

        await selecteerEnZoom(
          gevondenResultaten
        );

        const gevondenElementen = [];

        for (const model of gevondenResultaten) {
          const runtimeIds =
            haalObjecten(model)
              .map(haalRuntimeId)
              .filter(function(id) {
                return (
                  id !== null &&
                  id !== undefined
                );
              });

          const properties =
            await API.viewer.getObjectProperties(
              model.modelId,
              runtimeIds
            );

          for (const objectProperties of properties) {
            gevondenElementen.push({
              mark: zoekPropertyWaarde(
                objectProperties,
                markPropertyNames
              ),

              weight: zoekPropertyWaarde(
                objectProperties,
                weightPropertyNames
              )
            });
          }
        }

        resultElement.innerHTML = "";

        const titel =
          document.createElement("div");

        titel.className = "result-title";
        titel.textContent = mark;

        resultElement.appendChild(titel);

        gevondenElementen.forEach(
          function(element, index) {
            const rij =
              document.createElement("div");

            rij.className =
              "result-weight";

            if (gevondenElementen.length === 1) {
              rij.textContent =
                "Gewicht: " +
                formatteerGewicht(
                  element.weight
                );
            } else {
              rij.textContent =
                "Element " +
                (index + 1) +
                " — Gewicht: " +
                formatteerGewicht(
                  element.weight
                );
            }

            resultElement.appendChild(rij);
          }
        );

        const info =
          document.createElement("div");

        info.className = "result-info";

        info.textContent =
          gevondenElementen.length +
          " object(en) gevonden via " +
          gebruikteProperty;

        resultElement.appendChild(info);

        clearButton.disabled = false;
      } catch (error) {
        console.error(
          "Zoeken op Cast Unit Mark mislukt:",
          error
        );

        resultElement.textContent =
          "Er ging iets fout tijdens het zoeken.";
      } finally {
        markSearchButton.disabled = false;
        generalSearchButton.disabled = false;
      }
    }

    function verdeelInGroepen(array, grootte) {
      const groepen = [];

      for (
        let index = 0;
        index < array.length;
        index += grootte
      ) {
        groepen.push(
          array.slice(index, index + grootte)
        );
      }

      return groepen;
    }

    function zoekMatchesInObject(
      objectProperties,
      zoektekst
    ) {
      const matches = [];

      const propertySets =
        Array.isArray(objectProperties.properties)
          ? objectProperties.properties
          : [];

      for (const propertySet of propertySets) {
        const setName =
          String(propertySet.set || "").trim();

        const properties =
          Array.isArray(propertySet.properties)
            ? propertySet.properties
            : [];

        for (const property of properties) {
          const waarde =
            String(property.value ?? "");

          if (
            normaliseerTekst(waarde)
              .includes(zoektekst)
          ) {
            matches.push({
              setName: setName,
              propertyName:
                String(property.name || ""),
              value: waarde
            });
          }
        }
      }

      return matches;
    }

    function normaliseerPropertySetNaam(waarde) {
      return String(waarde || "")
        .trim()
        .replace(/[\s-]+/g, "_")
        .toLocaleUpperCase("nl-BE");
    }

    function haalAltezIfcProperties(
      objectProperties
    ) {
      const gevondenProperties = [];

      const propertySets =
        Array.isArray(objectProperties.properties)
          ? objectProperties.properties
          : [];

      for (const propertySet of propertySets) {
        const setName =
          String(propertySet.set || "").trim();

        if (
          normaliseerPropertySetNaam(setName) !==
          "ALTEZ_IFC"
        ) {
          continue;
        }

        const properties =
          Array.isArray(propertySet.properties)
            ? propertySet.properties
            : [];

        for (const property of properties) {
          gevondenProperties.push({
            name: String(property.name || ""),
            value: String(property.value ?? "")
          });
        }
      }

      return gevondenProperties;
    }

    function zoekEersteHerkenbareNaam(
      objectProperties,
      index
    ) {
      const mogelijkeNamen = [
        "Assembly/Cast unit Mark",
        "Cast unit Mark",
        "Name",
        "Naam",
        "Mark",
        "Position"
      ];

      const propertySets =
        Array.isArray(objectProperties.properties)
          ? objectProperties.properties
          : [];

      for (const gewensteNaam of mogelijkeNamen) {
        for (const propertySet of propertySets) {
          const properties =
            Array.isArray(propertySet.properties)
              ? propertySet.properties
              : [];

          for (const property of properties) {
            if (
              normaliseerTekst(property.name) ===
              normaliseerTekst(gewensteNaam)
            ) {
              const waarde =
                String(property.value ?? "").trim();

              if (waarde) {
                return waarde;
              }
            }
          }
        }
      }

      return "Element " + (index + 1);
    }

    function maakAltezPropertyRij(property) {
      const rij =
        document.createElement("div");

      rij.className =
        "altez-property";

      const naam =
        document.createElement("div");

      naam.className =
        "altez-property-name";

      naam.textContent =
        property.name || "Naamloos";

      const waarde =
        document.createElement("div");

      waarde.className =
        "altez-property-value";

      waarde.textContent =
        property.value || "—";

      rij.appendChild(naam);
      rij.appendChild(waarde);

      return rij;
    }

    function toonAlgemeneZoekresultaten(
      zoektekstOrigineel,
      gevondenDetails
    ) {
      resultElement.innerHTML = "";

      const titel =
        document.createElement("div");

      titel.className = "result-title";

      titel.textContent =
        "Zoekresultaten: " +
        zoektekstOrigineel;

      resultElement.appendChild(titel);

      gevondenDetails.forEach(
        function(detail, index) {
          const detailsElement =
            document.createElement("details");

          detailsElement.className =
            "search-result";

          const summary =
            document.createElement("summary");

          summary.className =
            "search-result-summary";

          const elementNaam =
            zoekEersteHerkenbareNaam(
              detail.objectProperties,
              index
            );

          summary.textContent =
            (index + 1) +
            ". " +
            elementNaam;

          const inhoud =
            document.createElement("div");

          inhoud.className =
            "search-result-details";

          if (
            Array.isArray(detail.matches) &&
            detail.matches.length > 0
          ) {
            const matchInfo =
              document.createElement("div");

            matchInfo.className =
              "match-info";

            const eersteMatch =
              detail.matches[0];

            matchInfo.textContent =
              "Gevonden in: " +
              (
                eersteMatch.setName
                  ? eersteMatch.setName + " → "
                  : ""
              ) +
              eersteMatch.propertyName +
              "\nWaarde: " +
              eersteMatch.value;

            inhoud.appendChild(matchInfo);
          }

          const altezProperties =
            haalAltezIfcProperties(
              detail.objectProperties
            );

          if (altezProperties.length > 0) {
            const altezTitel =
              document.createElement("div");

            altezTitel.className =
              "altez-title";

            altezTitel.textContent =
              "ALTEZ_IFC";

            inhoud.appendChild(altezTitel);

            altezProperties.forEach(
              function(property) {
                inhoud.appendChild(
                  maakAltezPropertyRij(property)
                );
              }
            );
          } else {
            const geenProperties =
              document.createElement("div");

            geenProperties.className =
              "no-altez-properties";

            geenProperties.textContent =
              "Voor dit object werden geen ALTEZ_IFC-parameters gevonden.";

            inhoud.appendChild(
              geenProperties
            );
          }

          /*
           * De native <details>-toggle is betrouwbaarder dan alleen
           * een click-handler op <summary>. Zodra een resultaat wordt
           * opengeklapt, selecteren en zoomen we naar dat object.
           */
          let selectieBezig = false;

          async function activeerZoekresultaat() {
            if (selectieBezig) {
              return;
            }

            selectieBezig = true;
            summary.classList.add("is-active");

            try {
              await selecteerEnZoomNaarEenObject(
                detail.modelId,
                Number(detail.runtimeId)
              );
            } catch (error) {
              console.error(
                "Resultaat selecteren mislukt:",
                error
              );

              summary.classList.add("selection-error");
              summary.title =
                "Selecteren of inzoomen is mislukt. Bekijk de browserconsole.";
            } finally {
              selectieBezig = false;
            }
          }

          summary.addEventListener(
            "click",
            function() {
              /*
               * Selecteer onmiddellijk bij een klik. De <details>-regel
               * wordt daarnaast door de browser zelf open- of dichtgeklapt.
               */
              activeerZoekresultaat();
            }
          );

          detailsElement.addEventListener(
            "toggle",
            function() {
              if (detailsElement.open) {
                activeerZoekresultaat();
              }
            }
          );

          detailsElement.appendChild(summary);
          detailsElement.appendChild(inhoud);

          resultElement.appendChild(
            detailsElement
          );
        }
      );

      const info =
        document.createElement("div");

      info.className = "result-info";

      info.textContent =
        gevondenDetails.length +
        " object(en) gevonden. Klik op een resultaat om het object te selecteren en de ALTEZ_IFC-details te bekijken.";

      resultElement.appendChild(info);
    }

    async function algemeenZoeken() {
      const zoektekstOrigineel =
        generalInput.value.trim();

      const zoektekst =
        normaliseerTekst(
          zoektekstOrigineel
        );

      if (!zoektekst) {
        resultElement.textContent =
          "Vul eerst een algemene zoektekst in.";

        return;
      }

      markSearchButton.disabled = true;
      generalSearchButton.disabled = true;
      clearButton.disabled = true;

      resultElement.textContent =
        "Alle modelparameters doorzoeken naar \"" +
        zoektekstOrigineel +
        "\"...\n\nDit kan bij een groot model even duren.";

      try {
        const alleObjecten =
          await API.viewer.getObjects();

        const gevondenDetails = [];

        for (
          let modelIndex = 0;
          modelIndex < alleObjecten.length;
          modelIndex++
        ) {
          const model =
            alleObjecten[modelIndex];

          const runtimeIds =
            haalObjecten(model)
              .map(haalRuntimeId)
              .filter(function(id) {
                return (
                  id !== null &&
                  id !== undefined
                );
              });

          const groepen =
            verdeelInGroepen(
              runtimeIds,
              300
            );

          for (
            let groepIndex = 0;
            groepIndex < groepen.length;
            groepIndex++
          ) {
            resultElement.textContent =
              "Model " +
              (modelIndex + 1) +
              " van " +
              alleObjecten.length +
              " doorzoeken...\n" +
              "Deel " +
              (groepIndex + 1) +
              " van " +
              groepen.length;

            const properties =
              await API.viewer.getObjectProperties(
                model.modelId,
                groepen[groepIndex]
              );

            for (
              const objectProperties
              of properties
            ) {
              const matches =
                zoekMatchesInObject(
                  objectProperties,
                  zoektekst
                );

              if (matches.length === 0) {
                continue;
              }

              const runtimeId =
                objectProperties.id ??
                objectProperties.runtimeId ??
                objectProperties.objectRuntimeId;

              if (
                runtimeId === null ||
                runtimeId === undefined
              ) {
                continue;
              }

              gevondenDetails.push({
                modelId: model.modelId,
                runtimeId: runtimeId,
                objectProperties:
                  objectProperties,
                matches: matches
              });
            }
          }
        }

        if (gevondenDetails.length === 0) {
          resultElement.textContent =
            "Geen parameterwaarde gevonden die \"" +
            zoektekstOrigineel +
            "\" bevat.";

          return;
        }

        toonAlgemeneZoekresultaten(
          zoektekstOrigineel,
          gevondenDetails
        );

        clearButton.disabled = false;
      } catch (error) {
        console.error(
          "Algemeen zoeken mislukt:",
          error
        );

        resultElement.textContent =
          "De algemene zoekactie is mislukt." +
          "\nBekijk eventueel F12 → Console.";
      } finally {
        markSearchButton.disabled = false;
        generalSearchButton.disabled = false;
      }
    }

    async function wisResultaten() {
      markInput.value = "";
      generalInput.value = "";

      resultElement.textContent =
        "Nog niets gezocht.";

      clearButton.disabled = true;

      try {
        if (API) {
          await API.viewer.setSelection(
            {
              modelObjectIds: []
            },
            "set"
          );
        }
      } catch (error) {
        console.warn(
          "Selectie wissen is niet gelukt:",
          error
        );
      }

      markInput.focus();
    }

    markInput.addEventListener(
      "input",
      function() {
        markInput.value =
          normaliseerMark(
            markInput.value
          );
      }
    );

    markInput.addEventListener(
      "keydown",
      function(event) {
        if (
          event.key === "Enter" &&
          !markSearchButton.disabled
        ) {
          zoekCastUnitMark();
        }
      }
    );

    generalInput.addEventListener(
      "keydown",
      function(event) {
        if (
          event.key === "Enter" &&
          !generalSearchButton.disabled
        ) {
          algemeenZoeken();
        }
      }
    );

    markSearchButton.addEventListener(
      "click",
      zoekCastUnitMark
    );

    generalSearchButton.addEventListener(
      "click",
      algemeenZoeken
    );

    clearButton.addEventListener(
      "click",
      wisResultaten
    );

    connectToTrimble();
  </script>
</body>
</html>
