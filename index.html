<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Cast Unit Finder</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px;
      font-family: Arial, Helvetica, sans-serif;
      color: #252525;
      background: #f3f4f5;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    #status {
      margin: 0 0 20px;
      font-size: 14px;
      color: #555;
    }

    .panel {
      padding: 16px;
      background: white;
      border: 1px solid #d8dadd;
      border-radius: 6px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .search-row {
      display: flex;
      gap: 8px;
    }

    input {
      min-width: 0;
      flex: 1;
      padding: 10px;
      border: 1px solid #aeb2b7;
      border-radius: 4px;
      font-size: 15px;
    }

    button {
      padding: 10px 15px;
      border: 0;
      border-radius: 4px;
      color: white;
      background: #0063a3;
      cursor: pointer;
    }

    button:hover {
      background: #004f83;
    }

    button:disabled {
      cursor: not-allowed;
      background: #9ba3a8;
    }

    #result {
      margin-top: 16px;
      padding: 14px;
      min-height: 70px;
      background: white;
      border: 1px solid #d8dadd;
      border-radius: 6px;
      font-size: 14px;
      white-space: pre-line;
    }

    .success {
      color: #19733b !important;
    }

    .error {
      color: #b42318 !important;
    }
  </style>
</head>

<body>
  <h1>Cast Unit Finder</h1>

  <p id="status">
    Verbinding met Trimble Connect controleren...
  </p>

  <section class="panel">
    <label for="cast-unit-mark">
      Cast Unit Mark
    </label>

    <div class="search-row">
      <input
        id="cast-unit-mark"
        type="text"
        placeholder="Bijvoorbeeld L23"
        autocomplete="off"
      >

      <button
        id="search-button"
        type="button"
        disabled
      >
        Zoeken
      </button>
    </div>
  </section>

  <section id="result">
    Nog geen object gezocht.
  </section>

  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

  <script>
    let API;

    const statusElement =
      document.getElementById("status");

    const inputElement =
      document.getElementById("cast-unit-mark");

    const searchButton =
      document.getElementById("search-button");

    const resultElement =
      document.getElementById("result");

    async function connectToTrimble() {
      try {
        API = await TrimbleConnectWorkspace.connect(
          window.parent,
          function (event, data) {
            console.log(
              "Trimble Connect-event:",
              event,
              data
            );
          }
        );

        const project =
          await API.project.getProject();

        statusElement.textContent =
          "Verbonden met project: " +
          (project.name || project.id);

        statusElement.classList.add("success");

        searchButton.disabled = false;
      } catch (error) {
        console.error(
          "Verbinding mislukt:",
          error
        );

        statusElement.textContent =
          "Verbinding met Trimble Connect mislukt.";

        statusElement.classList.add("error");
      }
    }

    async function zoekCastUnit() {
      const mark =
        inputElement.value.trim();

      if (!mark) {
        resultElement.textContent =
          "Vul eerst een Cast Unit Mark in.";

        return;
      }

      if (!API) {
        resultElement.textContent =
          "Er is nog geen verbinding met Trimble Connect.";

        return;
      }

      searchButton.disabled = true;

      resultElement.textContent =
        "Zoeken naar " + mark + "...";

      try {
        /*
         * In deze eerste test controleren we of de
         * extensie correct reageert.
         *
         * De echte modelzoekactie voegen we toe nadat
         * we de exacte IFC-propertynaam hebben vastgesteld.
         */

        resultElement.textContent =
          "De extensie werkt correct." +
          "\nIngegeven Cast Unit Mark: " + mark +
          "\n\nVolgende stap: de exacte propertynaam uit het IFC-model uitlezen.";

      } catch (error) {
        console.error(
          "Fout tijdens zoeken:",
          error
        );

        resultElement.textContent =
          "Er ging iets fout tijdens het zoeken.";
      } finally {
        searchButton.disabled = false;
      }
    }

    searchButton.addEventListener(
      "click",
      zoekCastUnit
    );

    inputElement.addEventListener(
      "keydown",
      function (event) {
        if (event.key === "Enter") {
          zoekCastUnit();
        }
      }
    );

    connectToTrimble();
  </script>
</body>
</html>
