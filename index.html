<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Cast Unit Finder</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, Helvetica, sans-serif;
      color: #252525;
      background: #f3f4f5;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 21px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    #status {
      margin: 0 0 16px;
      font-size: 13px;
      color: #555;
    }

    .panel {
      margin-bottom: 14px;
      padding: 15px;
      background: white;
      border: 1px solid #d8dadd;
      border-radius: 6px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: bold;
    }

    input,
    button {
      width: 100%;
      font: inherit;
    }

    input {
      padding: 10px;
      border: 1px solid #aeb2b7;
      border-radius: 4px;
      font-size: 16px;
    }

    #cast-unit-mark {
      text-transform: uppercase;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      padding: 10px 12px;
      border: 0;
      border-radius: 4px;
      color: white;
      background: #0063a3;
      cursor: pointer;
    }

    button:hover {
      background: #004f83;
    }

    button:disabled {
      cursor: not-allowed;
      background: #9ba3a8;
    }

    .secondary {
      color: #252525;
      background: #e4e6e8;
    }

    .secondary:hover {
      background: #d4d7d9;
    }

    #result {
      margin-top: 14px;
      padding: 14px;
      min-height: 80px;
      background: white;
      border: 1px solid #d8dadd;
      border-radius: 6px;
      font-size: 14px;
      white-space: pre-line;
    }

    .result-title {
      margin-bottom: 8px;
      font-size: 20px;
      font-weight: bold;
    }

    .result-row {
      margin-bottom: 7px;
      padding-bottom: 7px;
      border-bottom: 1px solid #eceeef;
    }

    .result-info {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }

    .success {
      color: #19733b !important;
    }

    .error {
      color: #b42318 !important;
    }

    .small-info {
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.4;
      color: #666;
    }
  </style>
</head>

<body>
  <h1>Modelzoeker</h1>

  <p id="status">
    Verbinding met Trimble Connect controleren...
  </p>

  <section class="panel">
    <h2>Zoeken op Cast Unit Mark</h2>

    <label for="cast-unit-mark">
      Assembly/Cast unit Mark
    </label>

    <input
      id="cast-unit-mark"
      type="text"
      placeholder="Bijvoorbeeld K10"
      autocomplete="off"
      autocapitalize="characters"
      spellcheck="false"
    >

    <button
      id="mark-search-button"
      type="button"
      disabled
      style="margin-top: 10px;"
    >
      Zoek Cast Unit Mark
    </button>
  </section>

  <section class="panel">
    <h2>Algemeen zoeken</h2>

    <p class="small-info">
      Zoekt de ingegeven tekst in alle parameterwaarden van alle geladen
      modelobjecten.
    </p>

    <label for="general-search">
      Zoektekst
    </label>

    <input
      id="general-search"
      type="text"
      placeholder="Bijvoorbeeld beton, L26, HEA240..."
      autocomplete="off"
      spellcheck="false"
    >

    <button
      id="general-search-button"
      type="button"
      disabled
      style="margin-top: 10px;"
    >
      Algemeen zoeken
    </button>
  </section>

  <div class="button-row">
    <button
      id="clear-button"
      class="secondary"
      type="button"
      disabled
    >
      Wissen
    </button>
  </div>

  <section id="result">
    Nog niets gezocht.
  </section>

  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

  <script>
    let API;

    const statusElement =
      document.getElementById("status");

    const markInput =
      document.getElementById("cast-unit-mark");

    const generalInput =
      document.getElementById("general-search");

    const markSearchButton =
      document.getElementById("mark-search-button");

    const generalSearchButton =
      document.getElementById("general-search-button");

    const clearButton =
      document.getElementById("clear-button");

    const resultElement =
      document.getElementById("result");

    const markPropertyNames = [
      "Tekla Assembly.Assembly/Cast unit Mark",
      "Assembly/Cast unit Mark",
      "Tekla Assembly.Cast unit Mark",
      "Cast unit Mark"
    ];

    const weightPropertyNames = [
      "Tekla Assembly.Assembly/Cast unit weight",
      "Assembly/Cast unit weight",
      "Tekla Assembly.Cast unit weight",
      "Cast unit weight"
    ];

    function normaliseerTekst(waarde) {
      return String(waarde ?? "")
        .trim()
        .toLocaleLowerCase("nl-BE");
    }

    function normaliseerMark(waarde) {
      return String(waarde ?? "")
        .trim()
        .toLocaleUpperCase("nl-BE");
    }

    async function connectToTrimble() {
      try {
        API = await TrimbleConnectWorkspace.connect(
          window.parent,
          function(event, data) {
            console.log(
              "Trimble Connect-event:",
              event,
              data
            );
          }
        );

        const project =
          await API.project.getProject();

        statusElement.textContent =
          "Verbonden met project: " +
          (project.name || project.id);

        statusElement.classList.add("success");

        markSearchButton.disabled = false;
        generalSearchButton.disabled = false;
      } catch (error) {
        console.error(error);

        statusElement.textContent =
          "Verbinding met Trimble Connect mislukt.";

        statusElement.classList.add("error");
      }
    }

    function haalObjecten(model) {
      return Array.isArray(model.objects)
        ? model.objects
        : [];
    }

    function haalRuntimeId(object) {
      if (typeof object === "number") {
        return object;
      }

      return (
        object.id ??
        object.runtimeId ??
        object.objectRuntimeId ??
        null
      );
    }

    function telObjecten(resultaten) {
      if (!Array.isArray(resultaten)) {
        return 0;
      }

      return resultaten.reduce(
        function(totaal, model) {
          return totaal + haalObjecten(model).length;
        },
        0
      );
    }

    function maakSelector(resultaten) {
      return {
        modelObjectIds: resultaten
          .map(function(model) {
            return {
              modelId: model.modelId,

              objectRuntimeIds:
                haalObjecten(model)
                  .map(haalRuntimeId)
                  .filter(function(id) {
                    return id !== null &&
                           id !== undefined;
                  })
            };
          })
          .filter(function(model) {
            return model.objectRuntimeIds.length > 0;
          })
      };
    }

    async function selecteerEnZoom(resultaten) {
      const selector =
        maakSelector(resultaten);

      await API.viewer.setSelection(
        selector,
        "set"
      );

      try {
        await API.viewer.setCamera(
          selector,
          {
            animationTime: 500
          }
        );
      } catch (error) {
        console.warn(
          "Inzoomen is niet gelukt:",
          error
        );
      }
    }

    function zoekPropertyWaarde(
      objectProperties,
      gewensteNamen
    ) {
      const propertySets =
        Array.isArray(objectProperties.properties)
          ? objectProperties.properties
          : [];

      for (const propertySet of propertySets) {
        const setName =
          String(propertySet.set || "").trim();

        const properties =
          Array.isArray(propertySet.properties)
            ? propertySet.properties
            : [];

        for (const property of properties) {
          const propertyName =
            String(property.name || "").trim();

          const volledigeNaam =
            setName
              ? setName + "." + propertyName
              : propertyName;

          const gevonden =
            gewensteNamen.some(
              function(gewensteNaam) {
                return (
                  normaliseerTekst(gewensteNaam) ===
                    normaliseerTekst(propertyName) ||
                  normaliseerTekst(gewensteNaam) ===
                    normaliseerTekst(volledigeNaam)
                );
              }
            );

          if (gevonden) {
            return property.value;
          }
        }
      }

      return null;
    }

    function formatteerGewicht(waarde) {
      if (
        waarde === null ||
        waarde === undefined ||
        waarde === ""
      ) {
        return "niet gevonden";
      }

      const tekst =
        String(waarde).trim();

      if (/(kg|ton|tonne|t)$/i.test(tekst)) {
        return tekst;
      }

      return tekst + " t";
    }

    async function zoekCastUnitMark() {
      const mark =
        normaliseerMark(markInput.value);

      markInput.value = mark;

      if (!mark) {
        resultElement.textContent =
          "Vul eerst een Cast Unit Mark in.";

        return;
      }

      markSearchButton.disabled = true;
      generalSearchButton.disabled = true;

      resultElement.textContent =
        "Zoeken naar Cast Unit Mark " +
        mark +
        "...";

      try {
        let gevondenResultaten = [];
        let gebruikteProperty = "";

        for (const propertyName of markPropertyNames) {
          const resultaten =
            await API.viewer.getObjects({
              parameter: {
                properties: {
                  [propertyName]: mark
                }
              }
            });

          if (telObjecten(resultaten) > 0) {
            gevondenResultaten = resultaten;
            gebruikteProperty = propertyName;
            break;
          }
        }

        if (telObjecten(gevondenResultaten) === 0) {
          resultElement.textContent =
            "Geen object gevonden voor " + mark + ".";

          return;
        }

        await selecteerEnZoom(
          gevondenResultaten
        );

        const gevondenElementen = [];

        for (const model of gevondenResultaten) {
          const runtimeIds =
            haalObjecten(model)
              .map(haalRuntimeId)
              .filter(function(id) {
                return id !== null &&
                       id !== undefined;
              });

          const properties =
            await API.viewer.getObjectProperties(
              model.modelId,
              runtimeIds
            );

          for (const objectProperties of properties) {
            gevondenElementen.push({
              mark: zoekPropertyWaarde(
                objectProperties,
                markPropertyNames
              ),
              weight: zoekPropertyWaarde(
                objectProperties,
                weightPropertyNames
              )
            });
          }
        }

        resultElement.innerHTML = "";

        const titel =
          document.createElement("div");

        titel.className = "result-title";
        titel.textContent = mark;

        resultElement.appendChild(titel);

        gevondenElementen.forEach(
          function(element, index) {
            const rij =
              document.createElement("div");

            rij.className = "result-row";

            if (gevondenElementen.length === 1) {
              rij.textContent =
                "Gewicht: " +
                formatteerGewicht(element.weight);
            } else {
              rij.textContent =
                "Element " +
                (index + 1) +
                " — Gewicht: " +
                formatteerGewicht(element.weight);
            }

            resultElement.appendChild(rij);
          }
        );

        const info =
          document.createElement("div");

        info.className = "result-info";

        info.textContent =
          gevondenElementen.length +
          " object(en) gevonden via " +
          gebruikteProperty;

        resultElement.appendChild(info);

        clearButton.disabled = false;
      } catch (error) {
        console.error(
          "Zoeken op Cast Unit Mark mislukt:",
          error
        );

        resultElement.textContent =
          "Er ging iets fout tijdens het zoeken.";
      } finally {
        markSearchButton.disabled = false;
        generalSearchButton.disabled = false;
      }
    }

    function verdeelInGroepen(array, grootte) {
      const groepen = [];

      for (
        let index = 0;
        index < array.length;
        index += grootte
      ) {
        groepen.push(
          array.slice(index, index + grootte)
        );
      }

      return groepen;
    }

    function zoekMatchesInObject(
      objectProperties,
      zoektekst
    ) {
      const matches = [];

      const propertySets =
        Array.isArray(objectProperties.properties)
          ? objectProperties.properties
          : [];

      for (const propertySet of propertySets) {
        const setName =
          String(propertySet.set || "").trim();

        const properties =
          Array.isArray(propertySet.properties)
            ? propertySet.properties
            : [];

        for (const property of properties) {
          const waarde =
            String(property.value ?? "");

          if (
            normaliseerTekst(waarde)
              .includes(zoektekst)
          ) {
            matches.push({
              setName: setName,
              propertyName:
                String(property.name || ""),
              value: waarde
            });
          }
        }
      }

      return matches;
    }

    async function algemeenZoeken() {
      const zoektekstOrigineel =
        generalInput.value.trim();

      const zoektekst =
        normaliseerTekst(zoektekstOrigineel);

      if (!zoektekst) {
        resultElement.textContent =
          "Vul eerst een algemene zoektekst in.";

        return;
      }

      markSearchButton.disabled = true;
      generalSearchButton.disabled = true;
      clearButton.disabled = true;

      resultElement.textContent =
        "Alle modelparameters doorzoeken naar \"" +
        zoektekstOrigineel +
        "\"...\n\nDit kan bij een groot model even duren.";

      try {
        /*
         * Zonder selector vraagt getObjects alle objecten
         * van de geladen modellen op.
         */
        const alleObjecten =
          await API.viewer.getObjects();

        const gevondenPerModel = [];
        const gevondenDetails = [];

        for (let modelIndex = 0;
             modelIndex < alleObjecten.length;
             modelIndex++) {

          const model =
            alleObjecten[modelIndex];

          const runtimeIds =
            haalObjecten(model)
              .map(haalRuntimeId)
              .filter(function(id) {
                return id !== null &&
                       id !== undefined;
              });

          const groepen =
            verdeelInGroepen(runtimeIds, 300);

          const gevondenRuntimeIds = [];

          for (let groepIndex = 0;
               groepIndex < groepen.length;
               groepIndex++) {

            resultElement.textContent =
              "Model " +
              (modelIndex + 1) +
              " van " +
              alleObjecten.length +
              " doorzoeken...\n" +
              "Deel " +
              (groepIndex + 1) +
              " van " +
              groepen.length;

            const properties =
              await API.viewer.getObjectProperties(
                model.modelId,
                groepen[groepIndex]
              );

            for (const objectProperties of properties) {
              const matches =
                zoekMatchesInObject(
                  objectProperties,
                  zoektekst
                );

              if (matches.length > 0) {
                gevondenRuntimeIds.push(
                  objectProperties.id
                );

                gevondenDetails.push({
                  modelId: model.modelId,
                  runtimeId: objectProperties.id,
                  matches: matches
                });
              }
            }
          }

          if (gevondenRuntimeIds.length > 0) {
            gevondenPerModel.push({
              modelId: model.modelId,
              objects:
                gevondenRuntimeIds.map(
                  function(id) {
                    return { id: id };
                  }
                )
            });
          }
        }

        if (gevondenDetails.length === 0) {
          resultElement.textContent =
            "Geen parameterwaarde gevonden die \"" +
            zoektekstOrigineel +
            "\" bevat.";

          return;
        }

        await selecteerEnZoom(
          gevondenPerModel
        );

        resultElement.innerHTML = "";

        const titel =
          document.createElement("div");

        titel.className = "result-title";
        titel.textContent =
          "Zoekresultaten: " +
          zoektekstOrigineel;

        resultElement.appendChild(titel);

        gevondenDetails
          .slice(0, 50)
          .forEach(
            function(detail, index) {
              const rij =
                document.createElement("div");

              rij.className = "result-row";

              const eersteMatch =
                detail.matches[0];

              const propertyPad =
                eersteMatch.setName
                  ? eersteMatch.setName +
                    " → " +
                    eersteMatch.propertyName
                  : eersteMatch.propertyName;

              rij.textContent =
                "Element " +
                (index + 1) +
                "\n" +
                propertyPad +
                ": " +
                eersteMatch.value;

              resultElement.appendChild(rij);
            }
          );

        const info =
          document.createElement("div");

        info.className = "result-info";

        info.textContent =
          gevondenDetails.length +
          " object(en) gevonden." +
          (
            gevondenDetails.length > 50
              ? " Alleen de eerste 50 resultaten worden in de extensie getoond."
              : ""
          );

        resultElement.appendChild(info);

        clearButton.disabled = false;
      } catch (error) {
        console.error(
          "Algemeen zoeken mislukt:",
          error
        );

        resultElement.textContent =
          "De algemene zoekactie is mislukt." +
          "\nBekijk eventueel F12 → Console.";
      } finally {
        markSearchButton.disabled = false;
        generalSearchButton.disabled = false;
      }
    }

    async function wisResultaten() {
      markInput.value = "";
      generalInput.value = "";

      resultElement.textContent =
        "Nog niets gezocht.";

      clearButton.disabled = true;

      try {
        await API.viewer.setSelection(
          {
            modelObjectIds: []
          },
          "set"
        );
      } catch (error) {
        console.warn(
          "Selectie wissen is niet gelukt:",
          error
        );
      }
    }

    markInput.addEventListener(
      "input",
      function() {
        markInput.value =
          normaliseerMark(markInput.value);
      }
    );

    markInput.addEventListener(
      "keydown",
      function(event) {
        if (
          event.key === "Enter" &&
          !markSearchButton.disabled
        ) {
          zoekCastUnitMark();
        }
      }
    );

    generalInput.addEventListener(
      "keydown",
      function(event) {
        if (
          event.key === "Enter" &&
          !generalSearchButton.disabled
        ) {
          algemeenZoeken();
        }
      }
    );

    markSearchButton.addEventListener(
      "click",
      zoekCastUnitMark
    );

    generalSearchButton.addEventListener(
      "click",
      algemeenZoeken
    );

    clearButton.addEventListener(
      "click",
      wisResultaten
    );

    connectToTrimble();
  </script>
</body>
</html>
